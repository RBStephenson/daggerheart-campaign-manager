services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - dhcm-data:/data
    environment:
      DHCM_DATABASE_URL: sqlite:////data/dhcm.sqlite3
      DHCM_HOST_USERNAME: ${DHCM_HOST_USERNAME:-}
      DHCM_HOST_PASSWORD: ${DHCM_HOST_PASSWORD:-}
      DHCM_SECRET_KEY: ${DHCM_SECRET_KEY:-}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  dhcm-data:
